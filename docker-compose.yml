services:
  postgres-db:
    image: postgres:16
    container_name: traffic-postgres
    environment:
      POSTGRES_DB: traffic
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1004
    ports:
      - "5432:5432"
    volumes:
      - traffic_postgres_data:/var/lib/postgresql/data

  spring-backend:
    build:
      context: .
      dockerfile: backend/traffic/Dockerfile
    container_name: traffic-spring-backend
    depends_on:
      - postgres-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/traffic
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1004
      FASTAPI_BASE_URL: http://fastapi-server:8000
    ports:
      - "8080:8080"

  fastapi-server:
    build:
      context: .
      dockerfile: fastapi-server/Dockerfile
    container_name: traffic-fastapi-server
    depends_on:
      - spring-backend
    environment:
      SPRING_BACKEND_BASE_URL: http://spring-backend:8080
      SPRING_DETECTION_PATH: /api/v1/detection-logs
      SPRING_SPEED_VIOLATION_PATH: /api/speed-violations
      SPRING_SPEED_VIOLATION_RETRY_ATTEMPTS: 2
      SPRING_SPEED_VIOLATION_RETRY_DELAY_SECONDS: 0.2
      SPRING_CAMERA_HEALTH_PATH: /internal/v1/camera-health-samples
      SPRING_CAMERA_HEALTH_TIMEOUT_SECONDS: 3
      SPRING_CAMERA_HEALTH_RETRY_ATTEMPTS: 3
      SPRING_CAMERA_HEALTH_RETRY_BASE_DELAY_SECONDS: 0.5
      BACKEND_INTERNAL_API_KEY: traffic-ai-internal-key-2026
      CAMERA_HEALTH_WINDOW_SECONDS: 60
      CAMERA_HEALTH_DELIVERY_QUEUE_MAX_SIZE: 1000
      CAMERA_HEALTH_DELIVERY_ENABLED: "true"
      CAMERA_HEALTH_DELIVERY_POLL_SECONDS: 1
      CAMERA_HEALTH_SHUTDOWN_TIMEOUT_SECONDS: 5
      CAMERA_PROCESSOR_CODE: edge-01
      CAMERA_ID_MAP_JSON: '{"CAM_001":1}'
      PREDICTIVE_MODEL_DIR: /app/models/predictive
      PREDICTIVE_ARTIFACT_REQUIRED: "false"
      PREDICTIVE_ARTIFACT_SHA256_JSON: '{}'
      INTERNAL_API_MAX_BODY_BYTES: 1048576
      IMAGE_STORAGE_DIR: storage/detections
      MODEL_PATH: /app/models/best.pt
      PLATE_MODEL_PATH: /app/models/best.pt
      VEHICLE_MODEL_NAME: yolo11s.pt
      VEHICLE_YOLO_CONF_THRESHOLD: 0.35
      VEHICLE_YOLO_IOU_THRESHOLD: 0.45
      VEHICLE_YOLO_MAX_DET: 10
      VEHICLE_CLASS_NAMES: car,bus,truck,motorcycle
      DETECTION_PREPROCESS_MODE: none
      SAVE_PLATE_CROP: "true"
      SAVE_VEHICLE_CROP: "false"
      SAVE_OCR_PREPROCESSED_IMAGE: "false"
      STREAM_FPS: 5
      PRE_BUFFER_SECONDS: 2
      POST_MISS_FRAMES: 5
      MAX_EVENT_SECONDS: 4
      TOP_N_OCR_FRAMES: 1
      SAVE_EVENT_DEBUG: "false"
      SPEED_DETECTION_ENABLED: "true"
      SPEED_DEFAULT_DISTANCE_METERS: 14.0
      SPEED_DEFAULT_LIMIT_KMH: 70.0
      SPEED_DEFAULT_MODE: TRACK_DELTA
      SPEED_DEFAULT_LINE_A: 356,289,1000,289
      SPEED_DEFAULT_LINE_B: 356,433,1000,433
      SPEED_CAMERA_CONFIGS_JSON: '[{"cameraCode":"CAM_001","speedMode":"TRACK_DELTA","lineA":[356,289,1000,289],"lineB":[356,433,1000,433],"roi":[[356,289],[1000,289],[1000,433],[356,433]],"distanceMeters":14.0,"speedLimitKmh":70.0,"enabled":true,"homography":{"imagePoints":[[356,289],[1000,289],[356,433],[1000,433]],"worldPointsMeters":[[0,0],[14,0],[0,14],[14,14]]}}]'
      SPEED_TRACK_MAX_DISTANCE_PIXELS: 180.0
      SPEED_TRACK_TTL_SECONDS: 4.0
      SPEED_MIN_ELAPSED_SECONDS: 0.05
      SPEED_MAX_REASONABLE_KMH: 220.0
      SPEED_TRACK_DELTA_WINDOW_SECONDS: 1.0
      SPEED_TRACK_DELTA_MIN_ELAPSED_SECONDS: 0.3
    ports:
      - "8000:8000"
    cpus: "2.0"
    mem_limit: 4g
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import os,urllib.request;
          import json;
          request=urllib.request.Request(
          'http://127.0.0.1:8000/internal/v1/anomaly-detection/health',
          headers={'X-Internal-Api-Key':os.environ['BACKEND_INTERNAL_API_KEY']});
          payload=json.load(urllib.request.urlopen(request,timeout=3));
          raise SystemExit(0 if payload.get('status') in ('UP','DEGRADED') else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./fastapi-server/storage:/app/storage
      - ./fastapi-server/models:/app/models:ro

  frontend:
    build:
      context: .
      dockerfile: trafficAS-b/Dockerfile
      args:
        VITE_API_BASE_URL: ""
        VITE_FASTAPI_BASE_URL: ""
    container_name: traffic-frontend
    depends_on:
      - spring-backend
      - fastapi-server
    ports:
      - "5174:80"

volumes:
  traffic_postgres_data:
